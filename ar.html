<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR 투어</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/debug.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui-overlay.js"></script>
  <script src="js/marker-mode.js"></script>
</head>
<body>
  <div id="ui">
    <section id="enter-screen">
      <div class="logo">🖼️</div>
      <h1>AR 투어 준비</h1>
      <p>아래 버튼을 누르면 카메라가 켜집니다.<br>벽에 걸린 <b>액자를 화면에 비추면</b> 그 내용이 나타납니다.</p>
      <button id="enter-ar-btn">▶ AR 시작</button>
      <p id="unsupported" class="warn" hidden></p>
      <a class="back-link" href="index.html">← 처음으로</a>
    </section>

    <header id="hud" hidden>
      <div id="pokedex">🖼️ <b><span id="found">0</span>/<span id="total">0</span></b></div>
      <div id="hint">📷 액자를 화면 안에 비춰보세요</div>
      <button id="reset-btn" aria-label="다시 시작">↻</button>
      <button id="exit-ar-btn" aria-label="AR 종료">✕</button>
    </header>

    <div id="popup" class="popup-overlay" hidden>
      <div class="popup-card">
        <button class="popup-close" aria-label="닫기">✕</button>
        <div class="popup-body"></div>
      </div>
    </div>

    <div id="debug"></div>
  </div>

  <!-- ===== MindAR 이미지 인식 씬 (고정 타겟) ===== -->
  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind; autoStart: false; maxTrack: 1"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 액자 인식 시 그 위에 뜨는 표시 (최대 12개 프레임 지원) -->
    <a-entity id="t0" mindar-image-target="targetIndex: 0"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
    <a-entity id="t1" mindar-image-target="targetIndex: 1"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
    <a-entity id="t2" mindar-image-target="targetIndex: 2"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
    <a-entity id="t3" mindar-image-target="targetIndex: 3"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
    <a-entity id="t4" mindar-image-target="targetIndex: 4"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
    <a-entity id="t5" mindar-image-target="targetIndex: 5"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
    <a-entity id="t6" mindar-image-target="targetIndex: 6"><a-plane class="abg" width="1.3" height="0.34" position="0 0.62 0" material="color:#000; opacity:0.55; shader:flat"></a-plane><a-text class="atitle" value="" align="center" color="#FFD700" position="0 0.62 0.01" width="2.4"></a-text></a-entity>
  </a-scene>
</body>
</html>
