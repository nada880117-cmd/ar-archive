<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR 투어</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/debug.js"></script>
  <script src="js/data-store.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui-overlay.js"></script>
  <script src="js/marker-mode.js"></script>
</head>
<body>
  <!-- ===== DOM 오버레이 UI ===== -->
  <div id="ui">
    <!-- 진입 전 화면 -->
    <section id="enter-screen">
      <div class="logo">🖼️</div>
      <h1>AR 투어 준비</h1>
      <p>아래 버튼을 누르면 카메라가 켜집니다.<br>벽에 걸린 <b>액자를 화면에 비추면</b> 그 내용이 나타납니다.</p>
      <button id="enter-ar-btn">▶ AR 시작</button>
      <p id="unsupported" class="warn" hidden></p>
      <a class="back-link" href="index.html">← 처음으로</a>
    </section>

    <!-- 진입 후 HUD -->
    <header id="hud" hidden>
      <div id="pokedex">🖼️ <b><span id="found">0</span>/<span id="total">0</span></b></div>
      <div id="hint">📷 액자를 화면 안에 비춰보세요</div>
      <button id="reset-btn" aria-label="다시 시작">↻</button>
      <button id="exit-ar-btn" aria-label="AR 종료">✕</button>
    </header>

    <!-- 내용 팝업 -->
    <div id="popup" class="popup-overlay" hidden>
      <div class="popup-card">
        <button class="popup-close" aria-label="닫기">✕</button>
        <div class="popup-body"></div>
      </div>
    </div>

    <div id="debug"></div>
  </div>

  <!-- ===== MindAR 이미지 인식 씬 ===== -->
  <a-scene
    mindar-image="imageTargetSrc: targets/targets.mind; autoStart: false; uiScanning: no; uiLoading: no; uiError: no; maxTrack: 1"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    embedded>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>
</body>
</html>
