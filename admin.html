<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR 아카이브 편집</title>
  <script src="js/data-store.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: "Noto Sans KR", system-ui, sans-serif;
           background: #0e1525; color: #e9eef7; padding-bottom: 40px; }
    header { position: sticky; top: 0; z-index: 5; background: #11192c;
             padding: 12px 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
             border-bottom: 1px solid #243049; }
    header h1 { font-size: 16px; margin: 0; flex: 1 1 auto; }
    .btn { border: 0; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 700;
           color: #fff; background: #2E86C1; }
    .btn.gray { background: #33415c; }
    .btn.green { background: #27AE60; }
    .saved { font-size: 12px; color: #6fe39a; flex: 1 1 100%; }

    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
              padding: 14px; max-width: 1100px; margin: 0 auto; align-items: start; }
    @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }
    .col { display: flex; flex-direction: column; gap: 14px; }

    .card { background: #16203a; border: 1px solid #243049; border-radius: 14px; padding: 14px; }
    .card h2 { font-size: 14px; margin: 0 0 10px; color: #9fb3d1; }

    /* 배치 지도 */
    #map { position: relative; width: 100%; aspect-ratio: 1/1;
           background:
             linear-gradient(#243049 1px, transparent 1px) 0 0/100% 12.5%,
             linear-gradient(90deg, #243049 1px, transparent 1px) 0 0/12.5% 100%,
             #0b1222;
           border: 1px solid #2c3a57; border-radius: 12px; touch-action: none; overflow: hidden; }
    #map .center { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
                   width: 22px; height: 22px; border-radius: 50%; background: #fff;
                   display: grid; place-items: center; font-size: 12px; pointer-events: none; }
    #map .axis { position: absolute; color: #4a5e83; font-size: 11px; pointer-events: none; }
    #map .ax-f { top: 4px; left: 50%; transform: translateX(-50%); }
    #map .ax-b { bottom: 4px; left: 50%; transform: translateX(-50%); }
    #map .ax-l { left: 4px; top: 50%; transform: translateY(-50%); }
    #map .ax-r { right: 4px; top: 50%; transform: translateY(-50%); }
    .dot { position: absolute; width: 38px; height: 38px; border-radius: 50%;
           transform: translate(-50%,-50%); display: grid; place-items: center;
           font-size: 10px; font-weight: 700; color: #fff;
           border: 2px solid rgba(255,255,255,.4); box-shadow: 0 0 8px rgba(0,0,0,.5);
           pointer-events: none; }
    .dot.sel { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.55); }
    .hint { color: #6f86a8; font-size: 12px; text-align: center; margin: 8px 0 0; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { border: 1px solid #2c3a57; border-radius: 999px; padding: 7px 12px; font-size: 13px;
            display: flex; align-items: center; gap: 7px; background: #0f1830; }
    .chip.sel { border-color: #fff; }
    .chip i { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

    label { display: block; font-size: 12px; color: #9fb3d1; margin: 12px 0 4px; }
    input, textarea, select { width: 100%; background: #0f1830; border: 1px solid #2c3a57;
            border-radius: 8px; color: #e9eef7; padding: 10px; font-size: 14px; font-family: inherit; }
    textarea { resize: vertical; min-height: 64px; }
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; }
    input[type=color] { padding: 4px; height: 42px; }
    input[type=range] { padding: 0; }
    .danger { background: #c0392b; }
    .muted { color: #6f86a8; font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <header>
    <h1>🏛️ AR 아카이브 편집</h1>
    <button class="btn green" id="ar-link">AR로 보기 ▶</button>
    <button class="btn gray" id="export">내보내기</button>
    <button class="btn gray" id="import">가져오기</button>
    <span class="saved" id="saved">✓ 자동 저장됨</span>
    <input type="file" id="file" accept="application/json" hidden>
  </header>

  <div class="layout">
    <!-- 왼쪽: 배치 지도 + 목록 -->
    <div class="col">
      <div class="card">
        <h2>📍 배치 (위에서 본 모습 · 가운데가 시작 지점)</h2>
        <div id="map">
          <div class="center" title="시작 지점">🧍</div>
          <div class="axis ax-f">앞</div>
          <div class="axis ax-b">뒤</div>
          <div class="axis ax-l">왼쪽</div>
          <div class="axis ax-r">오른쪽</div>
        </div>
        <p class="hint">유물(원)을 끌어서 위치를 옮기세요. 탭하면 선택됩니다. (범위 ±5m)</p>
      </div>

      <div class="card">
        <h2>🔵 유물 목록</h2>
        <div class="chips" id="chips"></div>
        <button class="btn" id="add" style="margin-top:12px;">＋ 새 유물 추가</button>
      </div>
    </div>

    <!-- 오른쪽: 선택한 유물 편집 -->
    <div class="col">
      <div class="card">
        <h2>✏️ 선택한 유물 편집</h2>
        <div id="form"></div>
      </div>
      <p class="muted">
        ※ 편집 내용은 <b>이 태블릿</b>에 자동 저장됩니다. 같은 태블릿의 AR에서 바로 반영돼요.<br>
        ※ 사진/영상은 인터넷 주소(https://…) 또는 저장소 경로(assets/photos/사진.jpg)를 넣으세요.<br>
        ※ 백업/이동은 <b>내보내기</b> JSON 사용. 가로로 돌리면 좌우 2단으로 넓게 보입니다.
      </p>
    </div>
  </div>

  <script>
    var RANGE = 5;
    var eras = Store.load();
    var selId = eras.length ? eras[0].id : null;
    var dragEra = null;

    var mapEl = document.getElementById('map');
    var chipsEl = document.getElementById('chips');
    var formEl = document.getElementById('form');
    var savedEl = document.getElementById('saved');

    function save() { Store.save(eras); savedEl.textContent = '✓ 자동 저장됨'; }
    function sel() { return eras.find(function (e) { return e.id === selId; }); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

    function xToPx(x) { return (x + RANGE) / (2 * RANGE) * mapEl.clientWidth; }
    function zToPy(z) { return (z + RANGE) / (2 * RANGE) * mapEl.clientHeight; }
    function pxToX(px) { return Math.max(-RANGE, Math.min(RANGE, px / mapEl.clientWidth * 2 * RANGE - RANGE)); }
    function pyToZ(py) { return Math.max(-RANGE, Math.min(RANGE, py / mapEl.clientHeight * 2 * RANGE - RANGE)); }

    function renderMap() {
      Array.prototype.slice.call(mapEl.querySelectorAll('.dot')).forEach(function (d) { d.remove(); });
      eras.forEach(function (e) {
        var dot = document.createElement('div');
        dot.className = 'dot' + (e.id === selId ? ' sel' : '');
        dot.style.background = e.color;
        dot.style.left = xToPx(e.x) + 'px';
        dot.style.top = zToPy(e.z) + 'px';
        dot.textContent = (e.title || '').slice(0, 4);
        mapEl.appendChild(dot);
      });
    }

    /* 지도 전체에서 드래그 처리 (원을 직접 만지지 않아도 됨) */
    mapEl.addEventListener('pointerdown', function (ev) {
      var r = mapEl.getBoundingClientRect();
      var px = ev.clientX - r.left, py = ev.clientY - r.top;
      var hit = null, best = 1e9;
      eras.forEach(function (e) {
        var d = Math.hypot(xToPx(e.x) - px, zToPy(e.z) - py);
        if (d < 30 && d < best) { best = d; hit = e; }
      });
      if (!hit) return;
      dragEra = hit; selId = hit.id;
      mapEl.setPointerCapture(ev.pointerId);
      renderChips(); renderForm(); renderMap();
    });
    mapEl.addEventListener('pointermove', function (ev) {
      if (!dragEra) return;
      var r = mapEl.getBoundingClientRect();
      dragEra.x = +pxToX(ev.clientX - r.left).toFixed(2);
      dragEra.z = +pyToZ(ev.clientY - r.top).toFixed(2);
      renderMap(); updatePosFields(dragEra);
    });
    function endDrag() { if (dragEra) { dragEra = null; save(); } }
    mapEl.addEventListener('pointerup', endDrag);
    mapEl.addEventListener('pointercancel', endDrag);

    function renderChips() {
      chipsEl.innerHTML = '';
      eras.forEach(function (e) {
        var c = document.createElement('div');
        c.className = 'chip' + (e.id === selId ? ' sel' : '');
        c.innerHTML = '<i style="background:' + e.color + '"></i>' + esc(e.title || '(제목없음)');
        c.addEventListener('click', function () { selId = e.id; renderAll(); });
        chipsEl.appendChild(c);
      });
    }

    function updatePosFields(e) {
      var xf = document.getElementById('f-x'), zf = document.getElementById('f-z');
      if (xf) xf.value = e.x; if (zf) zf.value = e.z;
    }

    function renderForm() {
      var e = sel();
      if (!e) { formEl.innerHTML = '<p class="muted">유물을 추가하거나 선택하세요.</p>'; return; }
      formEl.innerHTML =
        '<label>제목</label><input id="f-title" value="' + esc(e.title) + '">' +
        '<div class="row"><div><label>연도</label><input id="f-year" value="' + esc(e.year) + '"></div>' +
        '<div><label>색상</label><input id="f-color" type="color" value="' + (e.color || '#2E86C1') + '"></div></div>' +
        '<label>설명</label><textarea id="f-text">' + esc(e.text) + '</textarea>' +
        '<label>사진 주소 (한 줄에 하나)</label><textarea id="f-images" placeholder="assets/photos/사진1.jpg">' + esc((e.images || []).join('\n')) + '</textarea>' +
        '<label>영상 주소</label><input id="f-video" value="' + esc(e.video) + '" placeholder="assets/videos/영상.mp4">' +
        '<label>높이 (y): <span id="f-y-val">' + (e.y || 1.4) + '</span> m</label><input id="f-y" type="range" min="0" max="3" step="0.1" value="' + (e.y || 1.4) + '">' +
        '<div class="row" style="margin-top:6px;"><div><label>좌우 (x)</label><input id="f-x" value="' + e.x + '" readonly></div><div><label>앞뒤 (z)</label><input id="f-z" value="' + e.z + '" readonly></div></div>' +
        '<button class="btn danger" id="del" style="margin-top:16px;">이 유물 삭제</button>';

      bind('f-title', 'title', function () { renderChips(); renderMap(); });
      bind('f-year', 'year');
      bind('f-text', 'text');
      bind('f-color', 'color', function () { renderMap(); renderChips(); });
      bind('f-video', 'video');
      document.getElementById('f-images').addEventListener('input', function () {
        e.images = this.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean); save();
      });
      document.getElementById('f-y').addEventListener('input', function () {
        e.y = +this.value; document.getElementById('f-y-val').textContent = e.y; save();
      });
      document.getElementById('del').addEventListener('click', function () {
        if (!confirm('"' + (e.title || '이 유물') + '" 을(를) 삭제할까요?')) return;
        eras = eras.filter(function (x) { return x.id !== e.id; });
        selId = eras.length ? eras[0].id : null; save(); renderAll();
      });
    }

    function bind(id, key, after) {
      var el = document.getElementById(id); if (!el) return;
      el.addEventListener('input', function () {
        var e = sel(); if (!e) return; e[key] = this.value; save(); if (after) after();
      });
    }

    function renderAll() { renderMap(); renderChips(); renderForm(); }

    document.getElementById('add').addEventListener('click', function () {
      var e = Store.blank(); eras.push(e); selId = e.id; save(); renderAll();
    });
    document.getElementById('ar-link').addEventListener('click', function () { location.href = 'ar.html'; });
    document.getElementById('export').addEventListener('click', function () {
      var blob = new Blob([JSON.stringify(eras, null, 2)], { type: 'application/json' });
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'ar-archive-content.json'; a.click();
    });
    document.getElementById('import').addEventListener('click', function () { document.getElementById('file').click(); });
    document.getElementById('file').addEventListener('change', function (ev) {
      var f = ev.target.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function () {
        try {
          var d = JSON.parse(r.result);
          if (Array.isArray(d)) { eras = d; selId = eras.length ? eras[0].id : null; save(); renderAll(); alert('가져오기 완료'); }
          else alert('형식이 올바르지 않습니다.');
        } catch (e) { alert('JSON 읽기 실패: ' + e.message); }
      };
      r.readAsText(f);
    });

    window.addEventListener('resize', renderMap);
    renderAll();
    // 레이아웃 확정 후 좌표 재계산
    setTimeout(renderMap, 100);
  </script>
</body>
</html>
