<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR 아카이브 편집 (액자/마커)</title>
  <script src="js/data-store.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: "Noto Sans KR", system-ui, sans-serif;
           background: #0e1525; color: #e9eef7; padding-bottom: 40px; }
    header { position: sticky; top: 0; z-index: 5; background: #11192c;
             padding: 12px 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
             border-bottom: 1px solid #243049; }
    header h1 { font-size: 16px; margin: 0; flex: 1 1 auto; }
    .btn { border: 0; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 700; color: #fff; background: #2E86C1; }
    .btn.gray { background: #33415c; }
    .btn.green { background: #27AE60; }
    .btn.sm { padding: 5px 9px; font-size: 13px; }
    .saved { font-size: 12px; color: #6fe39a; flex: 1 1 100%; }

    .layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 14px; padding: 14px; max-width: 1100px; margin: 0 auto; align-items: start; }
    @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }
    .col { display: flex; flex-direction: column; gap: 14px; }
    .card { background: #16203a; border: 1px solid #243049; border-radius: 14px; padding: 14px; }
    .card h2 { font-size: 14px; margin: 0 0 10px; color: #9fb3d1; }

    /* 프레임 목록 */
    .frame { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #2c3a57;
             border-radius: 10px; background: #0f1830; margin-bottom: 8px; }
    .frame.sel { border-color: #fff; }
    .frame .idx { width: 26px; height: 26px; flex: none; border-radius: 6px; background: #243049;
                  display: grid; place-items: center; font-size: 12px; font-weight: 700; }
    .frame .dot { width: 14px; height: 14px; border-radius: 50%; flex: none; }
    .frame .nm { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .frame .ord { display: flex; flex-direction: column; gap: 2px; }
    .frame .ord button { border: 0; background: #33415c; color: #fff; border-radius: 4px; width: 26px; height: 16px; font-size: 10px; line-height: 1; }

    label { display: block; font-size: 12px; color: #9fb3d1; margin: 12px 0 4px; }
    input, textarea { width: 100%; background: #0f1830; border: 1px solid #2c3a57; border-radius: 8px;
            color: #e9eef7; padding: 10px; font-size: 14px; font-family: inherit; }
    textarea { resize: vertical; min-height: 60px; }
    .row { display: flex; gap: 10px; } .row > div { flex: 1; }
    input[type=color] { padding: 4px; height: 42px; }
    .danger { background: #c0392b; }
    .muted { color: #6f86a8; font-size: 12px; line-height: 1.6; }
    .thumb { max-width: 100%; max-height: 120px; border-radius: 8px; margin-top: 6px; display: none; }
  </style>
</head>
<body>
  <header>
    <h1>🖼️ 액자 콘텐츠 편집</h1>
    <button class="btn green" id="ar-link">AR로 보기 ▶</button>
    <button class="btn gray" id="export">내보내기</button>
    <button class="btn gray" id="import">가져오기</button>
    <span class="saved" id="saved">✓ 자동 저장됨</span>
    <input type="file" id="file" accept="application/json" hidden>
  </header>

  <div class="layout">
    <!-- 왼쪽: 프레임 순서 -->
    <div class="col">
      <div class="card">
        <h2>🖼️ 액자(프레임) 순서</h2>
        <div id="list"></div>
        <button class="btn" id="add" style="margin-top:6px;">＋ 액자 추가</button>
        <p class="muted" style="margin-top:10px;">
          이 <b>순서(#1, #2 …)</b>가 인식표 파일(targets.mind) 컴파일 순서와 같아야 합니다.<br>
          ▲▼ 로 순서를 바꿀 수 있어요.
        </p>
      </div>
    </div>

    <!-- 오른쪽: 선택 편집 -->
    <div class="col">
      <div class="card">
        <h2>✏️ 선택한 액자 편집</h2>
        <div id="form"></div>
      </div>
      <p class="muted">
        ※ 편집 내용은 <b>이 태블릿</b>에 자동 저장됩니다.<br>
        ※ 사진/영상/마커는 인터넷 주소(https://…) 또는 저장소 경로(assets/…)를 넣으세요.<br>
        ※ <b>마커 이미지</b> = 그 액자에 들어가는 실제 사진(인식 대상). 이 사진들로 targets.mind 를 만듭니다.<br>
        ※ 백업/이동은 <b>내보내기</b> JSON 사용.
      </p>
    </div>
  </div>

  <script>
    var data = Store.load();
    var selId = data.length ? data[0].id : null;
    var listEl = document.getElementById('list');
    var formEl = document.getElementById('form');
    var savedEl = document.getElementById('saved');

    function save() { Store.save(data); savedEl.textContent = '✓ 자동 저장됨'; }
    function sel() { return data.find(function (e) { return e.id === selId; }); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

    function renderList() {
      listEl.innerHTML = '';
      data.forEach(function (e, i) {
        var row = document.createElement('div');
        row.className = 'frame' + (e.id === selId ? ' sel' : '');
        row.innerHTML =
          '<div class="idx">#' + (i + 1) + '</div>' +
          '<div class="dot" style="background:' + e.color + '"></div>' +
          '<div class="nm">' + esc(e.title || '(제목없음)') + '</div>' +
          '<div class="ord"><button data-up="' + i + '">▲</button><button data-dn="' + i + '">▼</button></div>';
        row.querySelector('.nm').addEventListener('click', function () { selId = e.id; renderAll(); });
        row.querySelector('.idx').addEventListener('click', function () { selId = e.id; renderAll(); });
        row.querySelector('.dot').addEventListener('click', function () { selId = e.id; renderAll(); });
        listEl.appendChild(row);
      });
      listEl.querySelectorAll('[data-up]').forEach(function (b) {
        b.addEventListener('click', function () { move(+b.getAttribute('data-up'), -1); });
      });
      listEl.querySelectorAll('[data-dn]').forEach(function (b) {
        b.addEventListener('click', function () { move(+b.getAttribute('data-dn'), 1); });
      });
    }

    function move(i, dir) {
      var j = i + dir;
      if (j < 0 || j >= data.length) return;
      var tmp = data[i]; data[i] = data[j]; data[j] = tmp;
      save(); renderAll();
    }

    function renderForm() {
      var e = sel();
      if (!e) { formEl.innerHTML = '<p class="muted">액자를 추가하거나 선택하세요.</p>'; return; }
      formEl.innerHTML =
        '<label>제목</label><input id="f-title" value="' + esc(e.title) + '">' +
        '<div class="row"><div><label>연도</label><input id="f-year" value="' + esc(e.year) + '"></div>' +
        '<div><label>색상(유물 색)</label><input id="f-color" type="color" value="' + (e.color || '#2E86C1') + '"></div></div>' +
        '<label>🎯 마커 이미지 주소 (이 액자의 실제 사진)</label><input id="f-marker" value="' + esc(e.marker) + '" placeholder="assets/markers/액자1.jpg">' +
        '<img class="thumb" id="thumb">' +
        '<label>설명</label><textarea id="f-text">' + esc(e.text) + '</textarea>' +
        '<label>사진 주소 (한 줄에 하나)</label><textarea id="f-images" placeholder="assets/photos/사진1.jpg">' + esc((e.images || []).join('\n')) + '</textarea>' +
        '<label>🎬 영상 주소</label><input id="f-video" value="' + esc(e.video) + '" placeholder="assets/videos/영상.mp4 또는 https://...">' +
        '<button class="btn danger" id="del" style="margin-top:16px;">이 액자 삭제</button>';

      bindThumb(e);
      bind('f-title', 'title', function () { renderList(); });
      bind('f-year', 'year');
      bind('f-color', 'color', function () { renderList(); });
      bind('f-marker', 'marker', function () { bindThumb(sel()); });
      bind('f-text', 'text');
      bind('f-video', 'video');
      document.getElementById('f-images').addEventListener('input', function () {
        e.images = this.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean); save();
      });
      document.getElementById('del').addEventListener('click', function () {
        if (!confirm('"' + (e.title || '이 액자') + '" 을(를) 삭제할까요?')) return;
        data = data.filter(function (x) { return x.id !== e.id; });
        selId = data.length ? data[0].id : null; save(); renderAll();
      });
    }

    function bindThumb(e) {
      var img = document.getElementById('thumb'); if (!img) return;
      if (e && e.marker) { img.src = e.marker; img.style.display = 'block';
        img.onerror = function () { img.style.display = 'none'; }; }
      else { img.style.display = 'none'; }
    }

    function bind(id, key, after) {
      var el = document.getElementById(id); if (!el) return;
      el.addEventListener('input', function () {
        var e = sel(); if (!e) return; e[key] = this.value; save(); if (after) after();
      });
    }

    function renderAll() { renderList(); renderForm(); }

    document.getElementById('add').addEventListener('click', function () {
      var e = Store.blank(); data.push(e); selId = e.id; save(); renderAll();
    });
    document.getElementById('ar-link').addEventListener('click', function () { location.href = 'ar.html'; });
    document.getElementById('export').addEventListener('click', function () {
      var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'ar-archive-content.json'; a.click();
    });
    document.getElementById('import').addEventListener('click', function () { document.getElementById('file').click(); });
    document.getElementById('file').addEventListener('change', function (ev) {
      var f = ev.target.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function () {
        try {
          var d = JSON.parse(r.result);
          if (Array.isArray(d)) { data = d; selId = data.length ? data[0].id : null; save(); renderAll(); alert('가져오기 완료'); }
          else alert('형식이 올바르지 않습니다.');
        } catch (e) { alert('JSON 읽기 실패: ' + e.message); }
      };
      r.readAsText(f);
    });

    renderAll();
  </script>
</body>
</html>
